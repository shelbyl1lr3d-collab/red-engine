<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%GAME_TITLE%</title>
  <style>
    :root { --primary: %PRIMARY_COLOR%; --secondary: %SECONDARY_COLOR%; --bg: %BG_COLOR%; --accent: %ACCENT_COLOR%; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:#eee; font-family:monospace; text-align:center; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
    #header { padding:8px; background:rgba(0,0,0,0.5); }
    h1 { color:var(--primary); font-size:20px; }
    #score { color:var(--primary); font-size:28px; font-weight:bold; }
    #health { color:#ff3333; font-size:18px; }
    #token-badge { background:var(--secondary); color:#000; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:bold; display:inline-block; }
    #canvas-wrap { flex:1; display:flex; justify-content:center; align-items:center; }
    canvas { border:2px solid var(--primary); background:#000; max-width:100%; max-height:100%; }
    #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; justify-content:center; align-items:center; flex-direction:column; }
    #overlay h2 { color:var(--primary); font-size:36px; }
    .btn { background:var(--primary); color:#000; padding:12px 32px; border:none; font-size:18px; font-weight:bold; border-radius:8px; cursor:pointer; margin:10px; }
  </style>
</head>
<body>
  <div id="header">
    <h1 data-bind="title">%GAME_TITLE%</h1>
    <div><span id="token-badge">%TOKEN_SYMBOL%</span></div>
    <div id="score">Score: 0</div>
    <div id="health">Health: 100</div>
  </div>
  <div id="canvas-wrap"><canvas id="g" width="400" height="600"></canvas></div>
  <div id="overlay">
    <h2>GAME OVER</h2>
    <p style="color:#eee;font-size:20px;margin:15px;">Score: <span id="final-score">0</span></p>
    <button class="btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>
  <script>
    const THEME = { primary: '%PRIMARY_COLOR%', secondary: '%SECONDARY_COLOR%', bg: '%BG_COLOR%', accent: '%ACCENT_COLOR%' };
    const TOKEN = '%TOKEN_SYMBOL%';
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    const W = 400, H = 600;
    
    // Game state
    let player, zombies, bullets, score, health, running, gameOver, spawnTimer;
    
    // SLOWER zombie settings (was 2, now 0.8)
    const ZOMBIE_SPEED = 0.8;
    const ZOMBIE_SPAWN_RATE = 120;
    const PLAYER_SPEED = 5;
    const BULLET_SPEED = 8;
    
    function init() {
      player = { x: W/2, y: H-80, w: 30, h: 30 };
      zombies = [];
      bullets = [];
      score = 0;
      health = 100;
      running = false;
      gameOver = false;
      spawnTimer = 0;
      document.getElementById('score').innerText = 'Score: 0';
      document.getElementById('health').innerText = 'Health: 100';
    }
    
    // Controls
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (!running && !gameOver) {
        running = true;
        document.getElementById('overlay').style.display = 'none';
      }
      // Shoot with space
      if (e.key === ' ' && running) {
        bullets.push({ x: player.x, y: player.y - 15, w: 4, h: 10 });
      }
    });
    document.addEventListener('keyup', e => keys[e.key] = false);
    
    // Touch controls
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      player.x = (touch.clientX - rect.left) * (W / rect.width);
    });
    canvas.addEventListener('touchstart', e => {
      if (!running && !gameOver) {
        running = true;
        document.getElementById('overlay').style.display = 'none';
      }
      if (running) {
        bullets.push({ x: player.x, y: player.y - 15, w: 4, h: 10 });
      }
    });
    
    function spawnZombie() {
      const size = 25 + Math.random() * 15;
      zombies.push({
        x: Math.random() * (W - size),
        y: -size,
        w: size,
        h: size,
        speed: ZOMBIE_SPEED * (0.8 + Math.random() * 0.4)
      });
    }
    
    function update() {
      if (!running || gameOver) return;
      
      // Player movement
      if (keys['ArrowLeft'] && player.x > player.w/2) player.x -= PLAYER_SPEED;
      if (keys['ArrowRight'] && player.x < W - player.w/2) player.x += PLAYER_SPEED;
      
      // Spawn zombies
      spawnTimer++;
      if (spawnTimer >= ZOMBIE_SPAWN_RATE) {
        spawnZombie();
        spawnTimer = 0;
      }
      
      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= BULLET_SPEED;
        if (bullets[i].y < -10) bullets.splice(i, 1);
      }
      
      // Update zombies (SLOWER)
      for (let i = zombies.length - 1; i >= 0; i--) {
        zombies[i].y += zombies[i].speed;
        
        // Check if zombie hit bottom
        if (zombies[i].y > H) {
          health -= 10;
          zombies.splice(i, 1);
          document.getElementById('health').innerText = 'Health: ' + health;
          if (health <= 0) die();
          continue;
        }
        
        // Check bullet collision
        for (let j = bullets.length - 1; j >= 0; j--) {
          if (rectCollide(zombies[i], bullets[j])) {
            zombies.splice(i, 1);
            bullets.splice(j, 1);
            score += 10;
            document.getElementById('score').innerText = 'Score: ' + score;
            break;
          }
        }
        
        // Check player collision
        if (zombies[i] && rectCollide(zombies[i], player)) {
          health -= 20;
          zombies.splice(i, 1);
          document.getElementById('health').innerText = 'Health: ' + health;
          if (health <= 0) die();
        }
      }
    }
    
    function rectCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }
    
    function die() {
      gameOver = true;
      running = false;
      document.getElementById('final-score').innerText = score;
      document.getElementById('overlay').style.display = 'flex';
    }
    
    function restartGame() {
      init();
      document.getElementById('overlay').style.display = 'none';
    }
    
    function draw() {
      // Background
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
      
      // Ground
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, H-50, W, 50);
      
      // Player
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(player.x - player.w/2, player.y - player.h/2, player.w, player.h);
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(player.x - 8, player.y - 8, 4, 4);
      ctx.fillRect(player.x + 4, player.y - 8, 4, 4);
      
      // Bullets
      ctx.fillStyle = '#ffcc00';
      bullets.forEach(b => ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h));
      
      // Zombies (green, slower)
      ctx.fillStyle = '#00aa44';
      zombies.forEach(z => {
        ctx.fillRect(z.x, z.y, z.w, z.h);
        // Zombie eyes
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(z.x + 5, z.y + 5, 4, 4);
        ctx.fillRect(z.x + z.w - 9, z.y + 5, 4, 4);
        ctx.fillStyle = '#00aa44';
      });
      
      // Health bar
      ctx.fillStyle = '#333';
      ctx.fillRect(10, H-40, 100, 10);
      ctx.fillStyle = health > 50 ? '#00ff88' : health > 25 ? '#ffcc00' : '#ff3333';
      ctx.fillRect(10, H-40, health, 10);
    }
    
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    
    init();
    loop();
  </script>
</body>
</html>
