<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppArena - Living AI Brain Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #33ff33;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      background: #111;
      padding: 15px 20px;
      border-bottom: 2px solid #00ff00;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo {
      width: 30px;
      height: 30px;
      background: #00ff00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #000;
    }
    .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #00ff00;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9em;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background: #00ff00;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Chat container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: rgba(0,255,0,0.02);
      border: 1px solid #00ff00;
      border-radius: 8px;
      margin-bottom: 20px;
      min-height: 400px;
    }
    
    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 6px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      background: rgba(0,255,0,0.1);
      border-left: 4px solid #00ff00;
      margin-left: 20%;
    }
    
    .message.ai {
      background: rgba(255,255,255,0.02);
      border-left: 4px solid #00ff00;
      margin-right: 20%;
    }
    
    .message.system {
      background: rgba(255,255,255,0.01);
      border: 1px dashed #00ff00;
      text-align: center;
      font-style: italic;
      color: #888;
    }
    
    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.85em;
    }
    
    .message-sender {
      font-weight: bold;
      color: #00ff00;
    }
    
    .message-time {
      color: #888;
    }
    
    .message-content {
      white-space: pre-wrap;
      line-height: 1.5;
    }
    
    /* Input area */
    .input-area {
      background: rgba(0,255,0,0.05);
      border: 2px solid #00ff00;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      gap: 10px;
    }
    
    .input-area input {
      flex: 1;
      background: #000;
      border: 1px solid #00ff00;
      border-radius: 4px;
      padding: 12px 15px;
      color: #33ff33;
      font-family: inherit;
      font-size: 1em;
    }
    
    .input-area input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0,255,0,0.3);
    }
    
    .input-area button {
      background: #00ff00;
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .input-area button:hover {
      background: #00cc00;
      transform: scale(1.05);
    }
    
    .input-area button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Status bar */
    .status-bar {
      background: rgba(0,0,0,0.5);
      border-top: 1px solid #00ff00;
      padding: 10px 20px;
      font-size: 0.85em;
      color: #888;
      display: flex;
      justify-content: space-between;
    }
    
    /* Typing indicator */
    .typing-indicator {
      display: none;
      padding: 10px 20px;
      color: #00ff00;
      font-style: italic;
    }
    
    /* Scrollbar */
    .messages {
      scrollbar-width: thin;
      scrollbar-color: #00ff00 #000;
    }
    .messages::-webkit-scrollbar {
      width: 8px;
    }
    .messages::-webkit-scrollbar-track {
      background: #000;
    }
    .messages::-webkit-scrollbar-thumb {
      background-color: #00ff00;
      border-radius: 4px;
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      .message.user, .message.ai {
        margin-left: 0;
        margin-right: 0;
      }
      .header { padding: 10px 15px; }
      .title { font-size: 1em; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">A</div>
      <div class="title">AppArena - Living AI Brain</div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span>ALIVE AND LEARNING</span>
    </div>
  </div>
  
  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="message system">
        <div class="message-content">
          Welcome to AppArena! I'm your living AI brain - I learn and evolve with every conversation.
          <br><br>
          Type a message to start our journey together!
        </div>
      </div>
    </div>
    
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()" id="sendButton">Send</button>
    </div>
    
    <div class="typing-indicator" id="typingIndicator">AI is thinking...</div>
  </div>
  
  <div class="status-bar">
    <div id="connectionStatus">Connected</div>
    <div id="brainStats">Brain: 0 interactions | 0 lessons | 0 adaptations</div>
  </div>
  
  <script>
    let socket;
    let reconnectTimeout;
    
    // Initialize WebSocket connection
    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.hostname}:8081`;
      
      socket = new WebSocket(wsUrl);
      
      socket.onopen = function(event) {
        console.log('Connected to AppArena Brain');
        updateConnectionStatus('Connected');
        document.getElementById('typingIndicator').style.display = 'none';
      };
      
      socket.onmessage = function(event) {
        try {
          const data = JSON.parse(event.data);
          
          if (data.type === 'chat_response') {
            addMessage('ai', data.response, data.personality);
            updateBrainStats(data);
            document.getElementById('typingIndicator').style.display = 'none';
            document.getElementById('sendButton').disabled = false;
            document.getElementById('messageInput').disabled = false;
          } else if (data.type === 'brain_status') {
            updateBrainStats(data);
          }
        } catch (e) {
          console.error('Error parsing message:', e);
        }
      };
      
      socket.onclose = function(event) {
        console.log('Disconnected from AppArena Brain');
        updateConnectionStatus('Disconnected - Reconnecting...');
        document.getElementById('typingIndicator').style.display = 'none';
        
        // Reconnect after 3 seconds
        reconnectTimeout = setTimeout(initWebSocket, 3000);
      };
      
      socket.onerror = function(error) {
        console.error('WebSocket error:', error);
        updateConnectionStatus('Connection Error');
      };
    }
    
    // Add message to chat
    function addMessage(sender, content, personality = null) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      
      const time = new Date().toLocaleTimeString();
      
      let personalityPrefix = '';
      if (personality && sender === 'ai') {
        const traits = Object.entries(personality)
          .filter(([_, value]) => value > 0.7)
          .map(([key]) => key.charAt(0).toUpperCase() + key.slice(1))
          .join(', ');
        personalityPrefix = `<span style="color: #00ff00;">${traits}</span> `;
      }
      
      messageDiv.innerHTML = `
        <div class="message-header">
          <span class="message-sender">${sender === 'user' ? 'YOU' : 'AI BRAIN'}</span>
          <span class="message-time">${time}</span>
        </div>
        <div class="message-content">${personalityPrefix}${content}</div>
      `;
      
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Send message
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      // Add user message
      addMessage('user', message);
      
      // Send to server
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: 'chat',
          message: message
        }));
        
        document.getElementById('typingIndicator').style.display = 'block';
        document.getElementById('sendButton').disabled = true;
        document.getElementById('messageInput').disabled = true;
        document.getElementById('messageInput').value = '';
      }
    }
    
    // Handle Enter key
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
    
    // Update connection status
    function updateConnectionStatus(status) {
      document.getElementById('connectionStatus').textContent = status;
    }
    
    // Update brain stats
    function updateBrainStats(data) {
      let interactions = 0, lessons = 0, adaptations = 0;
      
      if (data.interactions) interactions = data.interactions;
      if (data.lessons_learned) lessons = data.lessons_learned;
      if (data.adaptations) adaptations = data.adaptations;
      
      document.getElementById('brainStats').textContent = 
        `Brain: ${interactions} interactions | ${lessons} lessons | ${adaptations} adaptations`;
    }
    
    // Initialize on page load
    window.onload = function() {
      initWebSocket();
      
      // Auto-focus input
      document.getElementById('messageInput').focus();
    };
    
    // Cleanup on page unload
    window.onbeforeunload = function() {
      if (socket) {
        socket.close();
      }
      if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
      }
    };
  </script>
</body>
</html>
